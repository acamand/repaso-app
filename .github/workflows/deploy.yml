name: Deploy to GitHub Pages

on:
  # Despliega automáticamente cuando se mergea a main.
  push:
    branches: [main]
  # Permite lanzar el deploy a mano desde la pestaña Actions.
  workflow_dispatch:

# Permisos mínimos que necesita actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un despliegue concurrente; si llega uno nuevo mientras hay otro en curso,
# este último se cancela y gana el nuevo.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
